events {}

http {
    upstream ml_backend {
        server stable:5000 weight=1;
        server canary:5000 weight=100;
    }

    server {
        listen 80;

        location /health {
            proxy_pass http://ml_backend/health;
        }

        location /predict {
            proxy_pass http://ml_backend/predict;
        }
    }
}
